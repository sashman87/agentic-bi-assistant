      approx_distinct: 74965
      min: ''
      max: ：Vesicovaginal fistula (VVF) is the nonphysiological communication between the bladder and
        vagina, and surgical closure is the gold treatment standard. Despite that successful closure occurs
        in around 85% of patients after the first repair, recurrence remains a highly distressing complication
        for patients and surgeons. The aim of our study was to evaluate the efficacy of a platelet-rich
        plasma (PRP) injection as a supportive treatment in the surgical repair of recurrent VVF. Between
        January 2018 and July 2019, 16 patients with recurrent VVF were injected with PRP in a tertiary
        gynecological department. Subsequently, a surgical Latzko procedure for VVF closure was scheduled
        6-8 weeks after the PRP injection allowing proper neovascularization and remodeling of surrounding
        tissues. Patients were considered cured if no leakage was observed after surgery and negative
        dye test results were indicated at follow-up. All patients who were examined therein remained
        dry. To the best of our knowledge, this is the first study aiming to assess PRP injections as
        a supporting treatment prior to surgical procedure for recurrent VVF. Preliminary results are
        encouraging, and we incorporated this method in our clinical practice. Further reports on a larger
        group will follow.
      description: Paper abstract (often NULL — filter when counting).
